<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilla General de Sorteo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .contenedor-planilla { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        .table { font-size: 0.9rem; }
        .header-sorteo { background-color: #2c3e50; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="contenedor-planilla">
        <h3 class="text-center mb-4">Información de Compensatorios - Mes de Abril</h3>
        
        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Obteniendo datos de la hoja...</p>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-sm" id="tablaDatos">
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
        
        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>
</div>

<script>
    // PEGA AQUÍ TU NUEVA URL DE GOOGLE (La que termina en /exec)
    const URL_API = "https://script.google.com/macros/s/AKfycbz8kLIq8aF4VwybSKZaOct1zIF9Z1HDSeeEPzwFnHV0nJ1j4Kzisk9i4mIZFM6UO9KG/exec";

    fetch(URL_API)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').classList.add('d-none');
            const cuerpo = document.getElementById('cuerpoTabla');
            
            // Recorremos cada fila de la matriz de Google
            data.matriz.forEach((fila, index) => {
                let htmlFila = "<tr>";
                
                fila.forEach(celda => {
                    // Si es la primera fila, le damos un estilo de encabezado
                    if(index === 0) {
                        htmlFila += `<th class="header-sorteo" colspan="${fila.length}">${celda}</th>`;
                    } else {
                        htmlFila += `<td>${celda || ''}</td>`;
                    }
                });
                
                htmlFila += "</tr>";
                // Si la fila estaba vacía en el Excel, no la ponemos
                if(fila.join('').trim() !== "") {
                    cuerpo.innerHTML += htmlFila;
                }
            });
        })
        .catch(err => {
            document.getElementById('loader').innerHTML = 
                `<div class="alert alert-danger">Error al conectar con Google. Verifica los permisos de 'Cualquier persona'.</div>`;
        });
</script>

</body>
</html>
