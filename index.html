<!DOCTYPE html>
<html lang="es">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Enlace fuera de servicio</title>
    
    <!-- Enlace a Bootstrap para un diseño rápido y responsivo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card-error {
        max-width: 450px;
        text-align: center;
        padding: 2rem;
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
      .icon-warning {
        font-size: 4rem;
        color: #ffc107;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>

    <div class="card card-error">
      <div class="icon-warning">⚠️</div>
      <h1 class="h3 mb-3">Acceso no disponible</h1>
      <p class="text-muted">
        El enlace al que intentas acceder ha sido desactivado
      </p>
      <hr>
     
      <a href="javascript:history.back()" class="btn btn-primary mt-3">Volver atrás</a>
    </div>

  </body>
</html>
